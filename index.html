<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Syrn Authentication</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:900px;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            display:flex;
        }

        .left{
            width:40%;
            background:linear-gradient(135deg,#b58cff,#8ec5fc);
            color:white;
            padding:40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left h1{
            font-size:40px;
            margin-bottom:15px;
        }

        .left p{
            line-height:1.6;
        }

        .right{
            width:60%;
            padding:40px;
        }

        .tabs{
            display:flex;
            margin-bottom:30px;
        }

        .tabs button{
            flex:1;
            padding:12px;
            border:none;
            background:#eee;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        .tabs button.active{
            background:#b58cff;
            color:white;
        }

        .form-box{
            display:none;
        }

        .form-box.active{
            display:block;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button.submit-btn{
            width:100%;
            padding:12px;
            background:#b58cff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-size:16px;
        }

        button.submit-btn:hover{
            background:#9b6dff;
        }

        .message{
            margin-top:15px;
            padding:10px;
            border-radius:8px;
            display:none;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }

        .logout-box{
            margin-top:30px;
            padding-top:20px;
            border-top:1px solid #ddd;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Syrn</h1>
        <p>
            Skincare Mobile Application Authentication System
            for Users and Admins.
        </p>
    </div>

    <div class="right">

        <div class="tabs">
            <button class="tab-btn active" onclick="showForm('login')">
                Login
            </button>

            <button class="tab-btn" onclick="showForm('signup')">
                Sign Up
            </button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login" class="form-box active">

            <h2>Login</h2>

            <form id="loginForm">

                <input type="email" name="email" placeholder="Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit" class="submit-btn">
                    Login
                </button>

            </form>

            <div id="loginMessage" class="message"></div>

        </div>

        <!-- SIGNUP FORM -->
        <div id="signup" class="form-box">

            <h2>Create Account</h2>

            <form id="signupForm">

                <input type="text" name="first_name" placeholder="First Name" required>

                <input type="text" name="last_name" placeholder="Last Name" required>

                <input type="email" name="email" placeholder="Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <select name="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

                <button type="submit" class="submit-btn">
                    Sign Up
                </button>

            </form>

            <div id="signupMessage" class="message"></div>

        </div>

        <!-- LOGOUT -->
        <div class="logout-box">

            <h3>Logout</h3>

            <button onclick="logout()" class="submit-btn">
                Logout
            </button>

            <div id="logoutMessage" class="message"></div>

        </div>

    </div>

</div>

<script>

    /* Switch Forms */
    function showForm(formId){

        document.querySelectorAll('.form-box')
            .forEach(box => box.classList.remove('active'));

        document.getElementById(formId)
            .classList.add('active');

        document.querySelectorAll('.tab-btn')
            .forEach(btn => btn.classList.remove('active'));

        event.target.classList.add('active');
    }

    /* Show Message */
    function showMessage(elementId, type, text){

        let box = document.getElementById(elementId);

        box.style.display = "block";
        box.className = "message " + type;
        box.innerHTML = text;
    }

    /* SIGNUP */
    document.getElementById("signupForm")
    .addEventListener("submit", async function(e){

        e.preventDefault();

        let formData = new FormData(this);

        let response = await fetch("signup.php",{
            method:"POST",
            body:formData
        });

        let data = await response.json();

        if(data.status === "success"){
            showMessage("signupMessage","success",data.message);
        }else{
            showMessage("signupMessage","error",data.message);
        }

    });

    /* LOGIN */
    document.getElementById("loginForm")
    .addEventListener("submit", async function(e){

        e.preventDefault();

        let formData = new FormData(this);

        let response = await fetch("login.php",{
            method:"POST",
            body:formData
        });

        let data = await response.json();

        if(data.status === "success"){

            showMessage(
                "loginMessage",
                "success",
                "Welcome " + data.user.first_name +
                " (" + data.user.role + ")"
            );

        }else{

            showMessage(
                "loginMessage",
                "error",
                data.message
            );
        }

    });

    /* LOGOUT */
    async function logout(){

        let response = await fetch("logout.php");

        let data = await response.json();

        if(data.status === "success"){
            showMessage("logoutMessage","success",data.message);
        }else{
            showMessage("logoutMessage","error","Logout failed");
        }
    }

</script>

</body>
</html>
